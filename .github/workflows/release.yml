name: "Release"
run-name: "Release - ${{ inputs.version }}-${{ inputs.revision }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version to tag and release"
        required: true
      snapshot-version:
        description: "The new SNAPSHOT version"
        required: true
      revision:
        description: "The package revision"
        default: "1"
      push-scm-changes:
        description: "Should commits and tags be pushed?"
        required: false
        default: false
      branch:
        description: "Branch to use"
        default: "main"

defaults:
  run:
    # Forces usage of Git Bash on Windows which makes the bash steps work.
    shell: "bash"

concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  tag:
    runs-on: "ubuntu-latest"

    permissions:
      contents: "write"

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"
        with:
          ref: "${{ inputs.branch }}" # Pull latest revision!
          persist-credentials: true

      - name: "Setup Git"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: "Setup graylog-project CLI"
        uses: "Graylog2/actions/project-cli@main"

      - name: "Setup Go environment"
        uses: "actions/setup-go@v6"
        with:
          go-version: "1.26"

      - name: "Setup environment"
        run: "go tool task -l"

      - name: "Set release versions"
        env:
          RELEASE_VERSION: "${{ inputs.version }}"
          RELEASE_REVISION: "${{ inputs.revision }}"
        run: "go tool task version:set:release > version.env"

      - name: "Rotate changelog"
        run: |
          graylog-project changelog release:path "${{ inputs.version }}"

      - name: "Tag release"
        run: |
          git add -v version.env
          git commit -m "[release] Set version to ${{ inputs.version }}-${{ inputs.revision }}"
          git tag "${{ inputs.version }}"
          git show

      - name: "Set SNAPSHOT versions"
        env:
          SNAPSHOT_VERSION: "${{ inputs.snapshot-version }}"
        run: "go tool task version:set:snapshot > version.env"

      - name: "Commit snapshot"
        run: |
          git add -v version.env
          git commit -m "[snapshot] Set version to ${{ inputs.snapshot-version }}-SNAPSHOT"
          git show

      - name: "Push commits and tags"
        if: "inputs.push-scm-changes == true"
        run: |
          git push origin
          git push origin "${{ inputs.version }}"
