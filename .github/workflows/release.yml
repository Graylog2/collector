name: "Release"
run-name: "Release - ${{ inputs.version }}-${{ inputs.revision }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version to tag and release"
        required: true
      snapshot-version:
        description: "The new SNAPSHOT version"
        required: true
      revision:
        description: "The package revision"
        default: "1"

defaults:
  run:
    # Forces usage of Git Bash on Windows which makes the bash steps work.
    shell: "bash"

jobs:
  tag:
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"
        with:
          persist-credentials: true

      - name: "Setup Git"
        uses: "Graylog2/internal-actions/setup-git@main"

      - name: "Setup Go environment"
        uses: "actions/setup-go@v6"
        with:
          go-version: "1.26"

      - name: "Setup environment"
        run: "go tool task -l"

      - name: "Set release versions"
        env:
          RELEASE_VERSION: "${{ inputs.version }}"
          RELEASE_REVISION: "${{ inputs.revision }}"
        run: "go tool task version:set:release > version.env"

      # TODO: Rotate changelogs

      - name: "Tag release"
        run: |
          git add -v version.env
          git diff --cached
          git commit -m "[release] Set version to ${{ inputs.release }}"
          git tag "${{ inputs.release }}"
          git show

      - name: "Set SNAPSHOT versions"
        env:
          SNAPSHOT_VERSION: "${{ inputs.snapshot-version }}"
        run: "go tool task version:set:snapshot > version.env"

      - name: "Commit snapshot"
        run: |
          git add -v version.env
          git diff --cached
          git commit -m "[snapshot] Set version to ${{ inputs.snapshot-version }}-SNAPSHOT"
          git show
