version: 2

updates:
  - package-ecosystem: "gomod"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 50
    labels:
      - "dependencies"
      - "go"
    directories:
      # TODO: Enable when extension/sidecar is ready
      #- "**/*"
      - "/"
      - "/builder"
      - "/receiver/windowseventlogreceiver"
      - "/superv"
    groups:
      # Group security updates for golang dependencies
      # into a single pull request
      golang-org:
        applies-to: "version-updates"
        patterns:
          - "golang.org*"
      open-telemetry:
        applies-to: "version-updates"
        patterns:
          - "go.opentelemetry.io/*"
          - "github.com/open-telemetry/*"
      koanf:
        applies-to: "version-updates"
        patterns:
          - "github.com/knadh/koanf*"
