version: 2

updates:
  - package-ecosystem: "gomod"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 50
    labels:
      - "dependencies"
      - "go"
    directories:
      # TODO: Enable when extension/sidecar is ready
      #- "**/*"
      - "/"
      - "/builder"
      - "/receiver/windowseventlogreceiver"
      - "/superv"
    ignore:
      # Dependabot doesn't work well for updating the OTel Collector
      # dependencies because we have to update the versions in the
      # builder/builder-config.yaml file.
      - dependency-name: "go.opentelemetry.io/*"
      - dependency-name: "github.com/open-telemetry/*"
    groups:
      # Group security updates for golang dependencies
      # into a single pull request
      golang-org:
        applies-to: "version-updates"
        patterns:
          - "golang.org*"
      koanf:
        applies-to: "version-updates"
        patterns:
          - "github.com/knadh/koanf*"
